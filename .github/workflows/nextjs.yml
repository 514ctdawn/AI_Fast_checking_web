name: Build and publish to gh-pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_DIST_DIR: .next-gh

      - name: Resolve publish directory
        run: |
          if [ -f "out/index.html" ]; then
            echo "PUBLISH_DIR=out" >> $GITHUB_ENV
            exit 0
          fi

          INDEX_FILE=$(find out -type f -name "index.html" | head -n 1 || true)
          if [ -n "$INDEX_FILE" ]; then
            PUBLISH_DIR=$(dirname "$INDEX_FILE")
            echo "Detected nested export root: $PUBLISH_DIR"
            echo "PUBLISH_DIR=$PUBLISH_DIR" >> $GITHUB_ENV
            exit 0
          fi

          echo "No index.html found in export output."
          ls -la
          ls -la out || true
          find out -maxdepth 5 -type f | head -n 100 || true
          exit 1

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.PUBLISH_DIR }}
          publish_branch: gh-pages
          force_orphan: true
